<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>פָּעַל ⇄ הִפְעִיל — Scene Recognition Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Hebrew:wght@400;600;700&family=Spectral:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#16203a; --bg2:#1d2a4d; --panel:#212f56; --line:#38477c;
  --text:#ece5d2; --dim:#a9b0c9;
  --gold:#d5a648; --gold-deep:#b8862f;
  --papyrus:#efe4c6; --papyrus-edge:#d8c99f;
  --ink:#33303a; --blue:#33688f;
  --qal:#7f8a4f; --hif:#c99a3f;
  --good:#4fae7f; --bad:#c9604f;
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{background:radial-gradient(1200px 700px at 50% -10%, var(--bg2), var(--bg) 70%);
  color:var(--text);font-family:"Spectral",Georgia,serif;min-height:100vh}
.heb{font-family:"Noto Serif Hebrew","SBL Hebrew","Ezra SIL",serif;direction:rtl}
.wrap{max-width:880px;margin:0 auto;padding:22px 16px 60px}

header{text-align:center;margin-bottom:18px}
h1{font-family:"Noto Serif Hebrew",serif;direction:rtl;font-weight:700;
   font-size:clamp(2rem,6vw,3rem);letter-spacing:.02em;color:var(--gold);line-height:1.3}
h1 .arrows{color:var(--dim);font-size:.8em}
.tagline{color:var(--dim);font-size:.95rem;margin-top:4px;font-style:italic}

.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin:14px 0 4px}
.legend .cell{display:flex;align-items:center;gap:10px;background:var(--panel);
  border:1px solid var(--line);border-radius:var(--radius);padding:8px 14px;font-size:.88rem;color:var(--dim)}
.legend .thumb{width:96px;border-radius:8px;overflow:hidden;flex:0 0 auto}
.legend .thumb svg{display:block;width:100%;height:auto}
.legend b{color:var(--text);font-family:"Noto Serif Hebrew",serif;direction:rtl}

.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-top:16px}
.card h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.14em;color:var(--gold);font-weight:600;margin-bottom:12px}
.modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.mode-btn{cursor:pointer;text-align:right;background:linear-gradient(160deg,var(--panel),#1a2647);
  border:1px solid var(--line);border-radius:var(--radius);padding:16px;color:var(--text);transition:.15s}
.mode-btn:hover{border-color:var(--gold);transform:translateY(-2px)}
.mode-btn .mname{font-family:"Noto Serif Hebrew",serif;direction:rtl;font-size:1.5rem;color:var(--gold);font-weight:600}
.mode-btn .mdesc{font-size:.85rem;color:var(--dim);margin-top:6px;text-align:left;direction:ltr;line-height:1.45}

#game,#results{display:none}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:10px 14px;margin-bottom:14px}
.stat{font-size:.85rem;color:var(--dim)}
.stat b{color:var(--gold);font-size:1.1rem;font-variant-numeric:tabular-nums}
.quit{background:none;border:1px solid var(--line);color:var(--dim);border-radius:8px;padding:6px 12px;cursor:pointer;font-family:inherit}
.quit:hover{border-color:var(--bad);color:var(--bad)}
#timerbar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;flex:1 1 120px;display:none}
#timerfill{height:100%;background:var(--gold);width:100%;transition:width .25s linear}

.prompt{text-align:center;color:var(--dim);font-size:.95rem;margin-bottom:12px}
.prompt .heb{color:var(--text);font-size:1.35rem;display:block;margin-bottom:2px}

.stage{display:flex;justify-content:center;margin-bottom:16px;padding-top:14px}
.scene{position:relative;background:var(--papyrus);border-radius:12px;border:1px solid var(--papyrus-edge);
  box-shadow:0 6px 22px rgba(0,0,0,.35), inset 0 0 40px rgba(160,130,70,.14);
  padding:6px;width:min(440px,100%)}
.scene svg{display:block;width:100%;height:auto;border-radius:8px}
.badge{position:absolute;top:-22px;inset-inline:0;margin-inline:auto;width:fit-content;
  background:var(--gold);color:#241c08;border-radius:12px;padding:8px 26px;
  font-family:"Noto Serif Hebrew",serif;direction:rtl;text-align:center;
  font-weight:700;font-size:1.7rem;box-shadow:0 4px 10px rgba(0,0,0,.4);line-height:1.25;z-index:2}

.bigform{text-align:center;margin:6px 0 18px}
.bigform .heb{font-size:clamp(2.6rem,9vw,4rem);font-weight:700;color:var(--text);line-height:1.5}

.opts{display:grid;gap:12px}
.opts.forms{grid-template-columns:repeat(2,1fr);max-width:560px;margin:0 auto}
.opts.scenes{grid-template-columns:repeat(2,1fr);max-width:640px;margin:0 auto}
.opt{cursor:pointer;border-radius:12px;transition:.15s;border:2px solid transparent;background:none;padding:0}
.opt:disabled{cursor:default}
.opt-form{background:var(--panel);border:2px solid var(--line);color:var(--text);
  font-size:1.9rem;padding:14px 10px;font-family:"Noto Serif Hebrew",serif;direction:rtl;line-height:1.6}
.opt-form:hover:not(:disabled){border-color:var(--gold);transform:translateY(-2px)}
.opt-scene .scene{width:100%;padding:4px}
.opt-scene:hover:not(:disabled) .scene{outline:2px solid var(--gold)}
.opt-form.correct{border-color:var(--good);background:rgba(79,174,127,.15)}
.opt-form.wrong{border-color:var(--bad);background:rgba(201,96,79,.15)}
.opt-scene.correct .scene{outline:3px solid var(--good)}
.opt-scene.wrong .scene{outline:3px solid var(--bad)}
.keyhint{font-family:"Spectral";font-size:.7rem;color:var(--dim);display:block;direction:ltr}

/* ---------- speed piles ---------- */
#piles{display:none;grid-template-columns:1fr 1fr;gap:14px;max-width:640px;margin:0 auto}
.pile{position:relative;cursor:pointer;border-radius:16px;min-height:170px;padding:38px 10px 34px;
  border:2px solid transparent;transition:.15s;overflow:hidden}
.pile:hover{transform:translateY(-2px)}
.pile-qal{background:linear-gradient(170deg,#8a9558,#6d783f);border-color:#5c6636}
.pile-hif{background:linear-gradient(170deg,#d6a94b,#b8862f);border-color:#9a7026}
.plabel{position:absolute;top:8px;inset-inline:0;text-align:center;font-family:"Noto Serif Hebrew",serif;direction:rtl;
  font-size:1.5rem;font-weight:700;color:#241c08;line-height:1.2}
.plabel small{display:block;font-family:"Spectral";direction:ltr;font-size:.66rem;font-weight:400;letter-spacing:.08em}
.pcount{position:absolute;top:8px;inset-inline-end:10px;background:rgba(20,15,5,.35);color:#f6eed6;
  border-radius:999px;min-width:26px;text-align:center;padding:2px 8px;font-size:.85rem;font-variant-numeric:tabular-nums}
.pwords{display:flex;flex-wrap:wrap;justify-content:center;align-content:flex-end;gap:2px;min-height:86px;margin-top:6px}
.pword{font-family:"Noto Serif Hebrew",serif;direction:rtl;background:var(--papyrus);color:var(--ink);
  border-radius:8px;padding:2px 9px;font-size:1.05rem;box-shadow:0 2px 4px rgba(0,0,0,.3);margin:-3px -2px}
.pword.miss{background:#e8c1b6;color:#7c2f22}
.pilehint{position:absolute;bottom:8px;inset-inline:0;text-align:center;font-size:.68rem;color:rgba(30,22,6,.65);letter-spacing:.05em}
.pile.flash-good{box-shadow:0 0 0 4px var(--good)}
.pile.flash-bad{animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}
.flyword{position:fixed;z-index:50;font-family:"Noto Serif Hebrew",serif;direction:rtl;font-weight:700;
  font-size:2.4rem;color:var(--text);pointer-events:none;transform:translate(-50%,-50%);
  transition:transform .4s cubic-bezier(.5,.05,.6,1), opacity .4s;will-change:transform}
.flyword.bad{color:var(--bad)}
.flyword.ok{color:#bfe3cf}

#feedback{display:none;max-width:640px;margin:16px auto 0;border-radius:var(--radius);
  padding:14px 16px;border:1px solid var(--line);background:var(--panel)}
#feedback.good{border-color:var(--good)}
#feedback.bad{border-color:var(--bad)}
.verdict{font-family:"Noto Serif Hebrew",serif;direction:rtl;font-size:1.35rem;font-weight:700;margin-bottom:8px}
#feedback.good .verdict{color:var(--good)}
#feedback.bad .verdict{color:var(--bad)}
.parse{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:6px}
.parse .pform{font-family:"Noto Serif Hebrew",serif;direction:rtl;font-size:1.6rem;color:var(--text);margin-inline-end:4px}
.pchip{border-radius:999px;padding:3px 11px;font-size:.78rem;letter-spacing:.03em;color:#241c08;font-weight:600}
.pchip.stem-qal{background:var(--qal);color:#f4f1e2}
.pchip.stem-hif{background:var(--hif)}
.pchip.plain{background:var(--line);color:var(--text);font-weight:400}
.gloss{color:var(--dim);font-style:italic;font-size:.95rem}
#nextbtn{display:block;margin:14px auto 0;background:var(--gold);color:#241c08;border:none;
  font-weight:700;font-size:1.25rem;padding:10px 40px;border-radius:999px;cursor:pointer}
#nextbtn:hover{background:var(--gold-deep)}

#results .card{text-align:center}
.gradering{width:150px;height:150px;margin:8px auto 4px;position:relative}
.gradering svg{width:100%;height:100%;transform:rotate(-90deg)}
.gradenum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:2.4rem;font-weight:600;color:var(--gold);font-variant-numeric:tabular-nums}
.finalsub{color:var(--dim);font-size:.95rem}
.misslist{margin-top:14px;text-align:right}
.misslist h3{font-size:.75rem;text-transform:uppercase;letter-spacing:.12em;color:var(--dim);text-align:left;margin-bottom:6px}
.missrow{display:flex;justify-content:space-between;gap:10px;border-top:1px dashed var(--line);
  padding:7px 2px;font-size:.9rem;color:var(--dim);align-items:center}
.missrow .heb{font-size:1.3rem;color:var(--text)}
.again{margin-top:18px;background:var(--gold);border:none;color:#241c08;font-family:inherit;
  font-weight:600;font-size:1rem;padding:10px 30px;border-radius:999px;cursor:pointer;margin-inline:6px}
.again.ghost{background:none;border:1px solid var(--line);color:var(--dim)}

footer{margin-top:34px;text-align:center;color:#5f6a8f;font-size:.75rem}
@media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">

<header>
  <h1><span>פָּעַל</span> <span class="arrows">⇄</span> <span>הִפְעִיל</span></h1>
</header>

<section id="setup">
  <div class="legend" id="legend"></div>
  <div class="card">
    <h2>Choose a game · בְּחַר מִשְׂחָק</h2>
    <div class="modes">
      <button class="mode-btn" data-mode="s2f">
        <div class="mname">מֶה הָיָה?</div>
        <div class="mdesc"><b>Scene → Form.</b> Watch the scene, read the time cue, and pick the verb form that says exactly that. 16-scene session; misses come back until you get them.</div>
      </button>
      <button class="mode-btn" data-mode="f2s">
        <div class="mname">מָה הַתְּמוּנָה?</div>
        <div class="mdesc"><b>Form → Scene.</b> Read the form, then tap the scene it describes. Root <em>and</em> stem both matter. 16-form session with repeat queue.</div>
      </button>
      <button class="mode-btn" data-mode="speed">
        <div class="mname">פָּעַל אוֹ הִפְעִיל?</div>
        <div class="mdesc"><b>Speed sort · 60s.</b> Forms fly at you in every person and tense — sort each onto the right pile. Missed words circle back into the stream.</div>
      </button>
    </div>
  </div>
</section>

<section id="game">
  <div class="topbar">
    <span class="stat">Score <b id="score">0</b></span>
    <span class="stat">Streak <b id="streak">0</b></span>
    <span class="stat" id="leftstat">Left <b id="left">16</b></span>
    <div id="timerbar"><div id="timerfill"></div></div>
    <button class="quit" id="quitbtn">⏻ Menu</button>
  </div>

  <div class="prompt" id="prompt"></div>
  <div class="bigform" id="bigform" style="display:none"><div class="heb" id="bigformtext"></div></div>
  <div class="stage" id="stage" style="display:none">
    <div class="scene"><div class="badge" id="badge"></div><div id="scenesvg"></div></div>
  </div>

  <div class="opts" id="opts"></div>

  <div id="piles">
    <button class="pile pile-hif" id="pileH">
      <div class="plabel">הִפְעִיל<small>hiphil · 2 / →</small></div>
      <div class="pcount" id="pcountH">0</div>
      <div class="pwords" id="pwordsH"></div>
      <div class="pilehint">causes another to act</div>
    </button>
    <button class="pile pile-qal" id="pileQ">
      <div class="plabel">פָּעַל<small>qal · 1 / ←</small></div>
      <div class="pcount" id="pcountQ">0</div>
      <div class="pwords" id="pwordsQ"></div>
      <div class="pilehint">the subject acts</div>
    </button>
  </div>

  <div id="feedback">
    <div class="verdict" id="verdict"></div>
    <div class="parse" id="parse"></div>
    <div class="gloss" id="gloss"></div>
  </div>
  <button id="nextbtn" class="heb" style="display:none">הַבָּא</button>
</section>

<section id="results">
  <div class="card">
    <h2 id="restitle">Finished · נִגְמַר!</h2>
    <div class="gradering">
      <svg viewBox="0 0 120 120">
        <circle cx="60" cy="60" r="52" fill="none" stroke="#38477c" stroke-width="10"/>
        <circle id="gradearc" cx="60" cy="60" r="52" fill="none" stroke="#d5a648" stroke-width="10"
          stroke-linecap="round" stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
      </svg>
      <div class="gradenum" id="gradenum">–</div>
    </div>
    <div class="finalsub" id="finalsub"></div>
    <div class="misslist" id="misslist"></div>
    <button class="again" id="againbtn">Play again</button>
    <button class="again ghost" id="menubtn">Menu</button>
  </div>
</section>

<footer>Qal ⇄ Hiphil · a communicative drill for Biblical Hebrew binyanim</footer>
</div>

<script>
"use strict";
/* ================================================================
   ART — illustrated papyrus scenes
   ONE dark figure = qal (subject acts).
   TWO participants + gold arrow = hiphil (subject causes).
================================================================ */
const INK="#33303a", BLU="#33688f", GLD="#b8862f", GLD2="#d5a648",
      WOOD="#7a5a35", WOOD2="#93724a", STONE="#a89b74", STONE2="#8f8266",
      SAND="#d6c69a", SAND2="#b9a877", HIDE="#93866f", HIDE2="#6e6350";

const C=(x,y,r,f)=>`<circle cx="${x}" cy="${y}" r="${r}" fill="${f}"/>`;
const L=(x1,y1,x2,y2,c,w=4)=>`<path d="M${x1} ${y1}L${x2} ${y2}" stroke="${c}" stroke-width="${w}" stroke-linecap="round" fill="none"/>`;
const P=(d,f)=>`<path d="${d}" fill="${f}"/>`;
const S=(d,c,w,extra="")=>`<path d="${d}" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round" fill="none" ${extra}/>`;

/* curved gold causation arrow */
function ARW(x1,y1,x2,y2,bulge=10){
  const mx=(x1+x2)/2, my=(y1+y2)/2;
  const dx=x2-x1, dy=y2-y1, len=Math.hypot(dx,dy)||1;
  const px=-dy/len*bulge, py=dx/len*bulge;
  const cx=mx+px, cy=my+py;
  const a=Math.atan2(y2-cy,x2-cx), h=9;
  return S(`M${x1} ${y1}Q${cx} ${cy} ${x2} ${y2}`,GLD,3.6)
    +L(x2,y2,x2-h*Math.cos(a-.5),y2-h*Math.sin(a-.5),GLD,3.6)
    +L(x2,y2,x2-h*Math.cos(a+.5),y2-h*Math.sin(a+.5),GLD,3.6);
}
const shadow=(x,rx,y=133)=>`<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="3.2" fill="rgba(60,45,20,.16)"/>`;

/* ---- figures: silhouettes with tunics ----
   head center (x,y) · standing height ≈ 52·s below head
   poses: stand | walk | carry | reach | raise (arms differ) */
function person(x,y,c,s=1,pose="stand",dir=-1){
  const u=v=>v*s, f=(dir===-1?1:-1), ox=v=>x+u(v)*f;
  const belt = c===BLU ? "#7fa8c4" : GLD2;
  let out = C(x,y,u(7.5),c) + L(x,y+u(5),x,y+u(10),c,u(4.5));
  /* tunic */
  out += P(`M${x-u(7.5)} ${y+u(9)} Q${x} ${y+u(6)} ${x+u(7.5)} ${y+u(9)} L${x+u(10.5)} ${y+u(34)} Q${x} ${y+u(36.5)} ${x-u(10.5)} ${y+u(34)} Z`, c);
  out += S(`M${x-u(8.4)} ${y+u(19.5)} Q${x} ${y+u(21.5)} ${x+u(8.4)} ${y+u(19.5)}`, belt, u(1.7), 'opacity=".85"');
  /* arms — poses authored facing left; dir=1 mirrors */
  const A=(tx,ty,qx,qy)=>S(`M${x} ${y+u(12)} Q${ox(qx)} ${y+u(qy)} ${ox(tx)} ${y+u(ty)}`, c, u(4.5));
  if(pose==="walk"){ out+=A(-14,22,-6,14)+A(10,25,6,16); }
  else if(pose==="carry"){ out+=A(-15,17,-7,12)+A(-15,22,-6,16); }
  else if(pose==="offer"){ out+=A(-14,5,-8,7)+A(-15,11,-8,12); }
  else if(pose==="reach"){ out+=A(-14,27,-6,18)+A(-15,31,-5,22); }
  else if(pose==="raise"){ out+=A(14,-2,10,4)+A(-8,24,-3,17); }
  else { out+=A(-6,27,-5,17)+A(6,27,5,17); }
  /* legs + feet */
  if(pose==="walk"||pose==="carry"||pose==="reach"){
    out += S(`M${ox(-3)} ${y+u(33)} L${ox(-11)} ${y+u(42)} L${ox(-15)} ${y+u(51)}`, c, u(4.5))
         + L(ox(-15),y+u(51),ox(-20),y+u(51.5),c,u(3.5))
         + S(`M${ox(3)} ${y+u(33)} L${ox(9)} ${y+u(43)} L${ox(14)} ${y+u(50)}`, c, u(4.5))
         + L(ox(14),y+u(50),ox(18.5),y+u(48.5),c,u(3.5));
  } else {
    out += L(x-u(4),y+u(33),x-u(5),y+u(51.5),c,u(4.5)) + L(x-u(5),y+u(51.5),x-u(10),y+u(52),c,u(3.5))
         + L(x+u(4),y+u(33),x+u(5),y+u(51.5),c,u(4.5)) + L(x+u(5),y+u(51.5),x+u(10),y+u(52),c,u(3.5));
  }
  return out;
}
/* seated, facing left; seatY = surface they sit on, footY = where feet land */
function sitPerson(x,seatY,footY,c,s=1){
  const u=v=>v*s, y=seatY-u(29);
  const belt = c===BLU ? "#7fa8c4" : GLD2;
  let out = C(x,y,u(7.5),c) + L(x,y+u(5),x,y+u(10),c,u(4.5));
  out += P(`M${x-u(7.5)} ${y+u(9)} Q${x} ${y+u(6)} ${x+u(7.5)} ${y+u(9)} L${x+u(9.5)} ${seatY} Q${x} ${seatY+u(2)} ${x-u(9.5)} ${seatY} Z`, c);
  out += S(`M${x-u(8)} ${y+u(19)} Q${x} ${y+u(21)} ${x+u(8)} ${y+u(19)}`, belt, u(1.7), 'opacity=".85"');
  out += S(`M${x-u(2)} ${seatY-u(2)} L${x-u(14)} ${seatY} L${x-u(14)} ${footY}`, c, u(6));
  out += L(x-u(14),footY,x-u(19),footY+u(.5),c,u(3.5));
  out += S(`M${x} ${y+u(12)} Q${x-u(6)} ${y+u(16)} ${x-u(10)} ${y+u(23)}`, c, u(4.5));
  return out;
}
/* lying, head at left (x,y) */
function lieP(x,y,c,s=1,dead=false){
  const u=v=>v*s;
  let out = C(x,y,u(7),c)
    + `<rect x="${x+u(6)}" y="${y-u(5)}" width="${u(27)}" height="${u(10)}" rx="${u(5)}" fill="${c}"/>`
    + L(x+u(31),y-u(1),x+u(45),y-u(3),c,u(4.5)) + L(x+u(31),y+u(1),x+u(46),y+u(3),c,u(4.5))
    + S(`M${x+u(14)} ${y-u(3)} Q${x+u(18)} ${y-u(10)} ${x+u(23)} ${y-u(6)}`, c, u(4));
  if(dead){
    const ex=(cx,cy)=>L(cx-2.4,cy-2.4,cx+2.4,cy+2.4,"#efe4c6",1.7)+L(cx+2.4,cy-2.4,cx-2.4,cy+2.4,"#efe4c6",1.7);
    out += ex(x-u(2.6),y-u(1.5)) + ex(x+u(3.4),y-u(1.5));
  }
  return out;
}

/* ---- backdrop + props ---- */

const TENSES={
  qat:{he:"קָטַל",en:"qatal · past",badge:"קָטַל"},
  ptc:{he:"בֵּינוֹנִי",en:"participle · present",badge:"בֵּינוֹנִי"},
  yiq:{he:"יִקְטֹל",en:"yiqtol · future",badge:"יִקְטֹל"},
  vay:{he:"וַיִּקְטֹל",en:"vayyiqtol · narrative",badge:"וַיִּקְטֹל"},
  imp:{he:"צִוּוּי",en:"imperative",badge:"צִוּוּי"}
};
const PRON={"3ms":"he","3fs":"she","3mp":"they","ms":"he","2ms":"you"};
const PLABEL={"3ms":"3ms","3fs":"3fs","3mp":"3mp","ms":"ms ptc","2ms":"2ms"};
function gloss(v,stem,tense,person){
  const g=v[stem].g, pr=PRON[person]||"he";
  const be = person==="3mp" ? "are" : "is";
  switch(tense){
    case "qat": return `${pr} ${g.past}`;
    case "yiq": return `${pr} will ${g.base}`;
    case "ptc": return `${pr} ${be} ${g.ing}`;
    case "vay": return `and then ${pr} ${g.past}`;
    case "imp": return g.imp;
  }
}

    forms:{qat:{"3ms":"הֵמִית","3fs":"הֵמִיתָה","3mp":"הֵמִיתוּ"},yiq:{"3ms":"יָמִית","3mp":"יָמִיתוּ"},
           vay:{"3ms":"וַיָּמֶת"},ptc:{"ms":"מֵמִית"},imp:{"2ms":"הָמֵת"}}}}
];
const V=Object.fromEntries(VERBS.map(v=>[v.key,v]));
const SG_PERSON={qat:"3ms",yiq:"3ms",vay:"3ms",ptc:"ms",imp:"2ms"};
function pairableTenses(v){
  return Object.keys(TENSES).filter(t=>
    v.qal.forms[t] && v.qal.forms[t][SG_PERSON[t]] &&
    v.hif.forms[t] && v.hif.forms[t][SG_PERSON[t]]);
}

/* ================================================================
   STATE
================================================================ */
const $=id=>document.getElementById(id);
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
const pick=a=>a[Math.random()*a.length|0];

const state={mode:null,score:0,streak:0,answers:0,correct:0,
  queue:[],current:null,misses:[],pileN:{qal:0,hif:0},
  timer:null,timeLeft:60,reviewQ:[],speedPool:[]};

/* legend */
$("legend").innerHTML=`
  <div class="cell"><div class="thumb"><svg viewBox="36 26 160 118">${SCENES.rkb.qal().replace(/^<svg[^>]*>|<\/svg>$/g,"")}</svg></div>
    <span>active<br><b>פָּעַל</b></span></div>
  <div class="cell"><div class="thumb"><svg viewBox="24 26 176 118">${SCENES.rkb.hif().replace(/^<svg[^>]*>|<\/svg>$/g,"")}</svg></div>
    <span>causative<br><b>הִפְעִיל</b></span></div>`;

document.querySelectorAll(".mode-btn").forEach(b=>b.onclick=()=>startGame(b.dataset.mode));
$("quitbtn").onclick=toMenu;
$("menubtn").onclick=toMenu;
$("againbtn").onclick=()=>startGame(state.mode);
$("nextbtn").onclick=nextRound;

function toMenu(){
  clearInterval(state.timer);
  $("game").style.display="none";$("results").style.display="none";
  $("setup").style.display="block";
}
function updateBar(){
  $("score").textContent=state.score;$("streak").textContent=state.streak;
  $("left").textContent=state.queue.length + (state.current&&state.mode!=="speed"?1:0);
}

/* ---- Leitner-style deck: every root × both stems, tense fixed per card;
        a missed card re-enters the queue a few positions later ---- */
function buildDeck(){
  const deck=[];
  VERBS.forEach(v=>["qal","hif"].forEach(stem=>{
    const t=pick(pairableTenses(v));
    deck.push({v,stem,tense:t,tries:0});
  }));
  return shuffle(deck);
}

function startGame(mode){
  state.mode=mode;state.score=0;state.streak=0;state.answers=0;state.correct=0;
  state.misses=[];state.current=null;state.reviewQ=[];
  state.pileN={qal:0,hif:0};
  $("setup").style.display="none";$("results").style.display="none";
  $("game").style.display="block";
  $("pwordsQ").innerHTML="";$("pwordsH").innerHTML="";
  $("pcountQ").textContent="0";$("pcountH").textContent="0";
  const speed = mode==="speed";
  $("timerbar").style.display = speed?"block":"none";
  $("leftstat").style.display = speed?"none":"inline";
  $("piles").style.display = speed?"grid":"none";
  $("opts").style.display = speed?"none":"grid";
  if(speed){
    state.speedPool=speedPool();
    state.timeLeft=60;$("timerfill").style.width="100%";
    state.timer=setInterval(()=>{
      state.timeLeft--;$("timerfill").style.width=(state.timeLeft/60*100)+"%";
      if(state.timeLeft<=0) endSession(true);
    },1000);
  } else {
    state.queue=buildDeck();
  }
  nextRound();
}

function nextRound(){
  $("feedback").style.display="none";$("nextbtn").style.display="none";
  if(state.mode==="speed"){buildSpeed();return;}
  $("opts").innerHTML="";
  if(!state.queue.length){endSession(false);return;}
  state.current=state.queue.shift();
  updateBar();
  if(state.mode==="s2f") buildSceneToForm(state.current);
  else buildFormToScene(state.current);
}

/* ---------- Mode 1: scene → form ---------- */
function buildSceneToForm(item){
  const {v,stem,tense}=item;
  const tenses=pairableTenses(v);
  const otherStem=stem==="qal"?"hif":"qal";
  const t2=pick(tenses.filter(t=>t!==tense));
  const opt=(s,t)=>({stem:s,tense:t,person:SG_PERSON[t],form:v[s].forms[t][SG_PERSON[t]]});
  const correct=opt(stem,tense);
  const options=shuffle([correct,opt(otherStem,tense),opt(stem,t2),opt(otherStem,t2)]);
  item.answer=correct;

  $("bigform").style.display="none";$("stage").style.display="flex";
  $("scenesvg").innerHTML=SCENES[v.key][stem]();
  const B=TENSES[tense];
  $("badge").innerHTML=B.badge;
  $("prompt").innerHTML=`<span class="heb">מֶה הָיָה?</span>Pick the form that matches the scene <b>and</b> the pattern label.`;

  const grid=$("opts");grid.className="opts forms";
  options.forEach((o,i)=>{
    const b=document.createElement("button");
    b.className="opt opt-form";
    if(o===correct)b.dataset.right="1";
    b.innerHTML=`${o.form}<span class="keyhint">${i+1}</span>`;
    b.onclick=()=>answerScene(b,o===correct,grid);
    grid.appendChild(b);
  });
}

/* ---------- Mode 2: form → scene ---------- */
function buildFormToScene(item){
  const {v,stem,tense}=item;
  const person=SG_PERSON[tense];
  const correct={stem,tense,person,form:v[stem].forms[tense][person]};
  item.answer=correct;
  const v2=pick(VERBS.filter(x=>x.key!==v.key));

  $("stage").style.display="none";$("bigform").style.display="block";
  $("bigformtext").textContent=correct.form;
  $("prompt").innerHTML=`<span class="heb">מָה הַתְּמוּנָה?</span>Tap the scene this form describes — the right action <b>and</b> the right stem.`;

  const cards=shuffle([{v,stem:"qal"},{v,stem:"hif"},{v:v2,stem:"qal"},{v:v2,stem:"hif"}]);
  const grid=$("opts");grid.className="opts scenes";
  cards.forEach((c,i)=>{
    const b=document.createElement("button");
    b.className="opt opt-scene";
    const right = c.v.key===v.key && c.stem===stem;
    if(right)b.dataset.right="1";
    b.innerHTML=`<div class="scene">${SCENES[c.v.key][c.stem]()}</div><span class="keyhint">${i+1}</span>`;
    b.onclick=()=>answerScene(b,right,grid);
    grid.appendChild(b);
  });
}

function answerScene(btn,isRight,grid){
  grid.querySelectorAll(".opt").forEach(b=>b.disabled=true);
  const item=state.current, c=item.answer, v=item.v;
  state.answers++;
  item.tries++;
  if(isRight){
    btn.classList.add("correct");
    state.correct++;state.score+=1+Math.min(state.streak,4);state.streak++;
  } else {
    btn.classList.add("wrong");state.streak=0;
    grid.querySelectorAll(".opt").forEach(b=>{if(b.dataset.right==="1")b.classList.add("correct");});
    state.misses.push({v,stem:c.stem,tense:c.tense,person:c.person,form:c.form});
    if(item.tries<3){ /* Leitner: back into the queue, a few cards later */
      state.queue.splice(Math.min(2,state.queue.length),0,item);
    }
  }
  updateBar();
  showFeedback(isRight,v,c);
  $("nextbtn").style.display="block";$("nextbtn").focus();
}

function showFeedback(isRight,v,c){
  const fb=$("feedback");
  fb.className=isRight?"good":"bad";fb.style.display="block";
  $("verdict").textContent=isRight?"טוֹב מְאֹד!":"לֹא";
  const stemChip=c.stem==="qal"
    ?`<span class="pchip stem-qal">פָּעַל · qal</span>`
    :`<span class="pchip stem-hif">הִפְעִיל · hiphil</span>`;
  $("parse").innerHTML=`<span class="pform heb">${c.form}</span>${stemChip}`
    +`<span class="pchip plain">${TENSES[c.tense].en}</span>`
    +`<span class="pchip plain">${PLABEL[c.person]}</span>`
    +`<span class="pchip plain heb">${v.root}</span>`;
  $("gloss").textContent="“"+gloss(v,c.stem,c.tense,c.person)+"”";
}

/* ---------- Mode 3: speed sort with piles ---------- */
function speedPool(){
  const pool=[];
  VERBS.forEach(v=>["qal","hif"].forEach(stem=>{
    Object.entries(v[stem].forms).forEach(([t,persons])=>{
      Object.entries(persons).forEach(([p,f])=>pool.push({v,stem,tense:t,person:p,form:f}));
    });
  }));
  return pool;
}
function buildSpeed(){
  /* Leitner stream: due review items take priority */
  let item=null;
  const dueIdx=state.reviewQ.findIndex(r=>r.due<=state.answers);
  if(dueIdx>=0){item=state.reviewQ.splice(dueIdx,1)[0].item;}
  else{
    item=pick(state.speedPool);
    if(state.current)while(item.form===state.current.form)item=pick(state.speedPool);
  }
  state.current=item;
  $("stage").style.display="none";$("bigform").style.display="block";
  $("bigformtext").textContent=item.form;
  $("prompt").innerHTML=`<span class="heb">פָּעַל אוֹ הִפְעִיל?</span>Sort each word onto its pile. Keys: <b>1 / ←</b> qal · <b>2 / →</b> hiphil`;
}
function answerSpeed(stem){
  if(state.mode!=="speed"||!state.current)return;
  const it=state.current;
  const ok = stem===it.stem;
  state.answers++;
  if(ok){state.correct++;state.score+=1+Math.min(state.streak,4);state.streak++;}
  else{
    state.streak=0;
    state.misses.push(it);
    state.reviewQ.push({item:it,due:state.answers+3}); /* comes back soon */
  }
  updateBar();
  sortToPile(it,ok,stem);
  buildSpeed();
}
function sortToPile(it,ok,chosen){
  const targetPile = it.stem==="qal" ? $("pileQ") : $("pileH");
  const wrongPile  = chosen==="qal" ? $("pileQ") : $("pileH");
  /* fly the word to its TRUE pile */
  const from=$("bigformtext").getBoundingClientRect();
  const to=targetPile.getBoundingClientRect();
  const c=document.createElement("div");
  c.className="flyword "+(ok?"ok":"bad");
  c.textContent=it.form;
  c.style.left=(from.left+from.width/2)+"px";
  c.style.top=(from.top+from.height/2)+"px";
  document.body.appendChild(c);
  const dx=(to.left+to.width/2)-(from.left+from.width/2);
  const dy=(to.top+to.height*0.62)-(from.top+from.height/2);
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    c.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px)) scale(.4) rotate(${ok?-7:9}deg)`;
    c.style.opacity=".25";
  });});
  targetPile.classList.add("flash-good");
  if(!ok)wrongPile.classList.add("flash-bad");
  setTimeout(()=>{
    c.remove();
    targetPile.classList.remove("flash-good");
    wrongPile.classList.remove("flash-bad");
    const words = it.stem==="qal" ? $("pwordsQ") : $("pwordsH");
    const chip=document.createElement("span");
    chip.className="pword"+(ok?"":" miss");
    chip.textContent=it.form;
    chip.style.transform=`rotate(${(Math.random()*10-5).toFixed(1)}deg)`;
    words.appendChild(chip);
    while(words.children.length>7)words.removeChild(words.firstChild);
    state.pileN[it.stem]++;
    (it.stem==="qal"?$("pcountQ"):$("pcountH")).textContent=state.pileN[it.stem];
  },400);
}
$("pileQ").onclick=()=>answerSpeed("qal");
$("pileH").onclick=()=>answerSpeed("hif");

/* ---------- session end + grade ---------- */
function endSession(wasSpeed){
  clearInterval(state.timer);
  $("game").style.display="none";$("results").style.display="block";
  $("restitle").textContent=wasSpeed?"הַקֵּץ בָּא!":"נִגְמַר!";
  const pct = state.answers? Math.round(state.correct/state.answers*100) : 0;
  $("gradenum").textContent=pct+"%";
  const arc=$("gradearc"), circ=326.7;
  arc.style.transition="none";arc.style.strokeDashoffset=circ;
  arc.style.stroke = pct>=90?"#4fae7f":pct>=70?"#d5a648":"#c9604f";
  requestAnimationFrame(()=>{requestAnimationFrame(()=>{
    arc.style.transition="stroke-dashoffset .9s ease";
    arc.style.strokeDashoffset=circ*(1-pct/100);
  });});
  $("finalsub").innerHTML=`${state.correct} / ${state.answers} correct · score <b style="color:var(--gold)">${state.score}</b>`
    + (state.misses.length?"":"<br>Perfect — לֹא טָעִיתָ!");
  /* dedupe misses by form */
  const seen=new Set(), uniq=[];
  state.misses.forEach(m=>{if(!seen.has(m.form)){seen.add(m.form);uniq.push(m);}});
  $("misslist").innerHTML = uniq.length ? "<h3>Review these</h3>"+uniq.map(m=>{
    const stem=m.stem==="qal"?`<span class="pchip stem-qal">פָּעַל</span>`:`<span class="pchip stem-hif">הִפְעִיל</span>`;
    return `<div class="missrow"><span class="heb">${m.form}</span>
      <span>${stem} · ${TENSES[m.tense].en} · ${PLABEL[m.person]} — <i>${gloss(m.v,m.stem,m.tense,m.person)}</i></span></div>`;
  }).join("") : "";
}

/* keyboard */
document.addEventListener("keydown",e=>{
  if($("game").style.display!=="block")return;
  if(state.mode==="speed"){
    if(e.key==="1"||e.key==="ArrowLeft")answerSpeed("qal");
    if(e.key==="2"||e.key==="ArrowRight")answerSpeed("hif");
    return;
  }
  if($("nextbtn").style.display==="block"&&(e.key==="Enter"||e.key===" ")){e.preventDefault();nextRound();return;}
  const n=parseInt(e.key);
  if(n>=1&&n<=4){
    const b=document.querySelectorAll("#opts .opt")[n-1];
    if(b&&!b.disabled)b.click();
  }
});
</script>
</body>
